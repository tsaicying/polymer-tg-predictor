services:
  - type: web
    name: polymer-tg-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: static
    name: polymer-tg-frontend
    staticPublishPath: ./frontend